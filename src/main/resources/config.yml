minegame:
  board:
    station-block: BEACON
    grid-size: 5
    wall-distance: 4
    hidden-block: COPPER_BARS
    safe-reveal-block: WAXED_COPPER_BLOCK
    mine-reveal-block: TNT
    frame-block: QUARTZ_BLOCK
    reset-delay-seconds: 3
    frame-one-higher: true
  frame-animation:
    enabled: false
    block: REDSTONE_LAMP
    pattern: 1
    mode: idle_only
    interval-ticks: 6
  casino-frame-activation-distance: 20.0
  game:
    duration-seconds: 300
    house-edge-percent: 4.0
    max-multiplier: 0
    max-payout: -1
    title-prefix: '&6[MineGame] &f'
  announcements:
    broadcast-start: false
    broadcast-cashout: false
    broadcast-win: false
    send-welcome-on-start: true
  effects:
    fireworks-on-win: true
    firework-count: 3
    win-ding-count: 5
  hologram:
    enabled: true
    line-spacing: 0.28
    behind-beacon-distance: 1.4
    base-height: 4.2
    view-range: 20.0

roulette:
  board-size: 13
  red-percent: 48.61
  black-percent: 48.61
  green-percent: 2.78
  betting-seconds: 15
  spin-seconds: 10
  result-seconds: 5
  min-bet: 1.0
  max-bet: -1
  red-multiplier: 2.0
  black-multiplier: 2.0
  green-multiplier: 35.0
  house-edge-percent: 4.0
  max-payout: -1
  max-bet-distance: 18.0
  activation-distance-from-frame: 20.0
  hologram-height: 5
  hologram-line-spacing: 0.6
  hologram-title-gap: 0
  hologram-section-gap: 0
  hologram-view-range: 20.0
  fireworks-per-winner: 1
  broadcast-top-winner: true
  blocks:
    frame: STONE_BRICKS
    red: RED_CONCRETE
    black: BLACK_CONCRETE
    green: LIME_CONCRETE
    selector: QUARTZ_BLOCK
  frame-animation:
    enabled: true
    block: REDSTONE_LAMP
    pattern: 8
    mode: idle_only
    interval-ticks: 6

